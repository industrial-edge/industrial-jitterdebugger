variables:
  http_proxy: "${CODE_PROXY}"
  https_proxy: "${CODE_PROXY}"
  no_proxy: "${CODE_NO_PROXY}"

stages:
  - check
  - python
  - docker
  - edgeapp

version:
  image: python:3.11
  stage: check
  script:
    - python3 -m venv venv
    - . venv/bin/activate
    - make dev
    - make version > build.env
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

